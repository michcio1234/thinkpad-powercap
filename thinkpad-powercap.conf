# /etc/thinkpad-powercap.conf
# Config for the thinkpad-powercap systemd unit (installed to /etc/).
# Caps the CPU package power so sustained load can't heat the die to ~90 C,
# which is what makes the firmware (DYTC) slash power to ~10-12 W and stutter.
# Edit, then apply with:   sudo systemctl restart thinkpad-powercap

# --- Sustained package power cap, in watts (this is PL1, the long-term limit) ---
# Lower = cooler & more stutter-proof but slower; higher = faster but risks the
# die reaching ~90 C and triggering the firmware power cut again.
# 22 W was verified to hold the die at ~85 C under full load. Tune ~22-28.
CAP_WATTS=22

# --- Also cap the short burst limit (PL2)? yes | no ---
# PL2 is the short-term turbo budget (factory ~64 W for a ~28 s window).
#   yes = cap PL2 to CAP_WATTS too. Flat, cool, no die spikes. RECOMMENDED:
#         with PL2 uncapped the chip bursts to ~64 W for ~28 s on load and
#         spikes the die to ~100 C before the sustained cap settles it.
#   no  = leave PL2 at factory. Snappier for short tasks (app launches) but
#         allows that opening ~100 C burst under sustained load.
CAP_PL2=no

# ============================ REFERENCE ============================
#
# FACTORY DEFAULTS (this machine, MSR interface /sys/class/powercap/intel-rapl:0):
#   PL1 (constraint_0, long_term)  = 64 W, ~28 s window
#   PL2 (constraint_1, short_term) = 64 W, ~2.4 ms window
#   nominal TDP (constraint_0_max_power_uw) = 28 W
#   NOTE: these vary with the power profile (balanced sets a much lower
#   firmware budget). The MMIO interface (intel-rapl-mmio:0) is managed
#   dynamically by DYTC and is NOT touched here.
#
# SET THE LIMITS MANUALLY (watts -> microwatts, so 22 W = 22000000):
#   PL1 only:   sudo tee /sys/class/powercap/intel-rapl:0/constraint_0_power_limit_uw <<< 22000000
#   PL2 too:    sudo tee /sys/class/powercap/intel-rapl:0/constraint_1_power_limit_uw <<< 22000000
#   Read back:  cat /sys/class/powercap/intel-rapl:0/constraint_0_power_limit_uw
#
# RESTORE FACTORY LIMITS without a reboot:
#   sudo /usr/local/sbin/thinkpad-powercap restore     # writes saved defaults
#   (or just reboot / suspend-resume with the unit disabled; firmware resets them)
#
# TURN THE UNIT OFF:
#   sudo systemctl disable --now thinkpad-powercap     # stop + don't run at boot
#   sudo /usr/local/sbin/thinkpad-powercap restore     # put limits back now
#   To also stop the resume hook, remove: /usr/lib/systemd/system-sleep/thinkpad-powercap
#   Full uninstall: delete that hook, /etc/systemd/system/thinkpad-powercap.service,
#   /usr/local/sbin/thinkpad-powercap, this file, and /etc/thinkpad-powercap.defaults
#   then: sudo systemctl daemon-reload
#
# CHECK STATUS / LOGS:
#   thinkpad-powercap status          # current caps, config, service state (no root)
#   systemctl status thinkpad-powercap
#   journalctl -t thinkpad-powercap
# ==================================================================
